/* ─── ICONS ─── */
function Ico({n,s=16,c='currentColor'}){
  const d={
    upload:<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>,
    download:<path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M8 12l4 4 4-4M12 3v13" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>,
    search:<><circle cx="11" cy="11" r="8" strokeWidth="2"/><path d="M21 21l-4.35-4.35" strokeWidth="2.2" strokeLinecap="round"/></>,
    close:<path d="M18 6L6 18M6 6l12 12" strokeWidth="2.2" strokeLinecap="round"/>,
    left:<path d="M15 18l-6-6 6-6" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>,
    right:<path d="M9 18l6-6-6-6" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>,
    check:<path d="M20 6L9 17l-5-5" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>,
    play:<polygon points="10 8 16 12 10 16 10 8" strokeWidth="1.5" fill="currentColor"/>,
    github:<path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>,
    zip:<><rect x="3" y="3" width="18" height="18" rx="2" strokeWidth="2"/><path d="M12 8v8m-3-4h6" strokeWidth="2" strokeLinecap="round"/></>,
    plus:<path d="M12 5v14M5 12h14" strokeWidth="2.2" strokeLinecap="round"/>,
    sliders:<><line x1="4" y1="6" x2="20" y2="6" strokeWidth="2" strokeLinecap="round"/><circle cx="8" cy="6" r="2.2" fill="var(--bg,#0C0B10)" strokeWidth="2"/><line x1="4" y1="14" x2="20" y2="14" strokeWidth="2" strokeLinecap="round"/><circle cx="16" cy="14" r="2.2" fill="var(--bg,#0C0B10)" strokeWidth="2"/></>,
  };
  return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} style={{display:'block',flexShrink:0}}>{d[n]}</svg>;
}

/* ─── BADGE ─── */
function Badge({type}){
  const v={
    photo:{l:'PHOTO',bg:'rgba(209,27,140,0.2)',c:'#F050BE',bd:'rgba(209,27,140,0.5)'},
    video:{l:'VIDEO',bg:'rgba(245,146,30,0.2)',c:'#FFB96A',bd:'rgba(245,146,30,0.5)'},
    raw:{l:'RAW',bg:'rgba(123,45,139,0.2)',c:'#B060DD',bd:'rgba(123,45,139,0.5)'},
  }[type]||{l:'FILE',bg:'#222',c:'#aaa',bd:'#333'};
  return <span style={{display:'inline-block',padding:'2px 7px',borderRadius:4,fontSize:9,fontWeight:800,letterSpacing:'0.12em',background:v.bg,color:v.c,border:`1px solid ${v.bd}`}}>{v.l}</span>;
}

/* ─── TOAST ─── */
function Toasts({list,remove}){
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,display:'flex',flexDirection:'column',gap:8}}>
      {list.map(t=>(
        <div key={t.id} onClick={()=>remove(t.id)} style={{
          background:t.type==='success'?'#CC1A88':t.type==='info'?'#1E1C28':'#990000',
          color:'#fff',padding:'10px 16px',borderRadius:10,fontSize:13,fontWeight:700,
          display:'flex',alignItems:'center',gap:8,animation:'toastIn 0.25s ease',
          cursor:'pointer',boxShadow:'0 8px 30px rgba(0,0,0,0.6)',
        }}>
          {t.type==='success'&&<Ico n="check" s={14} c="#fff"/>}{t.msg}
        </div>
      ))}
    </div>
  );
}

/* ─── MEDIA CARD ─── */
function Card({item,onOpen,selected,onSelect,bulk}){
  const [hov,setHov]=useState(false);
  return(
    <div style={{breakInside:'avoid',marginBottom:10,cursor:'pointer'}}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      onClick={()=>bulk?onSelect(item.id):onOpen(item)}>
      {/* Image area */}
      <div style={{
        height:item.h,
        background:GRADS[item.g],
        borderRadius:'10px 10px 0 0',
        position:'relative',
        overflow:'hidden',
        outline:selected?'2px solid #CC1A88':'none',
        outlineOffset:-2,
      }}>
        {/* Vignette */}
        <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(0,0,0,0.2) 0%,rgba(0,0,0,0) 35%,rgba(0,0,0,0.55) 100%)'}}/>

        {/* Film grain overlay */}
        <div style={{position:'absolute',inset:0,backgroundImage:'url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABAAQMAAACQp+OdAAAABlBMVEUAAAD///+l2Z/dAAAAAnRSTlP/AOW3MEoAAAAPSURBVBjTY2AYBYMTAAACAAFSliQfAAAAAElFTkSuQmCC")',opacity:0.04,mixBlendMode:'overlay'}}/>

        {/* Video play */}
        {item.type==='video'&&(
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{width:50,height:50,borderRadius:'50%',background:'rgba(0,0,0,0.6)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid rgba(255,255,255,0.25)',transform:hov?'scale(1.12)':'scale(1)',transition:'transform 0.18s',paddingLeft:3}}>
              <Ico n="play" s={20} c="#fff"/>
            </div>
          </div>
        )}
        {item.type==='video'&&item.dur&&(
          <div style={{position:'absolute',bottom:10,right:10,background:'rgba(0,0,0,0.75)',backdropFilter:'blur(6px)',color:'#fff',fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:5}}>{item.dur}</div>
        )}
        {item.type==='raw'&&(
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,0.7)'}}>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:'0.2em',marginBottom:6,opacity:0.6}}>RAW FILE</div>
            <div style={{fontSize:22,fontWeight:900,fontFamily:'Archivo Black',letterSpacing:'-0.02em'}}>{item.sz}</div>
          </div>
        )}

        {/* Hover overlay */}
        <div style={{position:'absolute',inset:0,background:'rgba(204,26,136,0.15)',opacity:hov&&!bulk?1:0,transition:'opacity 0.18s'}}/>

        {/* Hover DL */}
        {hov&&!bulk&&(
          <div style={{position:'absolute',top:10,right:10,animation:'fadeIn 0.15s ease'}}>
            <button onClick={e=>e.stopPropagation()} style={{background:'#CC1A88',color:'#fff',border:'none',borderRadius:8,padding:'6px 12px',fontSize:11,fontWeight:800,display:'flex',alignItems:'center',gap:4,letterSpacing:'0.05em'}}>
              <Ico n="download" s={11} c="#fff"/>DL
            </button>
          </div>
        )}

        {/* Badge */}
        <div style={{position:'absolute',top:10,left:10}}><Badge type={item.type}/></div>

        {/* Bulk check */}
        {bulk&&(
          <div style={{position:'absolute',top:10,right:10,width:22,height:22,borderRadius:6,background:selected?'#CC1A88':'rgba(0,0,0,0.6)',border:`2px solid ${selected?'#CC1A88':'rgba(255,255,255,0.4)'}`,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}}>
            {selected&&<Ico n="check" s={12} c="#fff"/>}
          </div>
        )}
      </div>

      {/* Caption panel */}
      <div style={{background:'#161422',borderRadius:'0 0 10px 10px',padding:'9px 12px',borderTop:'1px solid rgba(255,255,255,0.04)'}}>
        <div style={{fontWeight:700,fontSize:12,color:'#F5F0F8',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',marginBottom:4}}>{item.title}</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:11,color:'rgba(245,240,248,0.35)'}}>by {item.by}</span>
          <span style={{fontSize:10,color:'rgba(245,240,248,0.25)'}}>{item.sz}</span>
        </div>
      </div>
    </div>
  );
}

/* ─── SECTION DIVIDER ─── */
function SectionDivider({cat}){

        {cat.date&&<span style={{fontSize:12,fontWeight:700,color:'#F5921E',letterSpacing:'0.08em',textTransform:'uppercase'}}>{cat.date}</span>}
      </div>

      <div style={{marginTop:8,fontSize:12,color:'rgba(245,240,248,0.4)'}}>{cat.count} moments</div>
    </div>

}

/* ─── UPLOAD MODAL ─── */
function UploadModal({onClose,onDone}){
  const [phase,setPhase]=useState('idle');
  const [prog,setProg]=useState(0);
  const [cat,setCat]=useState('');
  const [title,setTitle]=useState('');
  const [drag,setDrag]=useState(false);
  const [file,setFile]=useState(null);

  const pick=f=>{setFile(f);setTitle(f.name.replace(/\.[^/.]+$/,''));};
  const onDrop=e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)pick(f);};

  const doUp=()=>{
    if(!file||!cat)return;
    setPhase('up');setProg(0);
    const iv=setInterval(()=>{
      setProg(p=>{const n=Math.min(p+Math.random()*12+5,100);
        if(n>=100){clearInterval(iv);setPhase('done');setTimeout(()=>{onDone();onClose();},1100);}
        return n;
      });
    },180);
  };

  const fmtSz=b=>{if(!b)return'';const m=b/(1024*1024);return m<1?`${(b/1024).toFixed(0)} KB`:`${m.toFixed(1)} MB`;};
  const catLabel=CATS.find(c=>c.id===cat)?.name||cat;

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',backdropFilter:'blur(14px)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 0.2s ease'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#141220',border:'1px solid rgba(255,255,255,0.08)',borderRadius:20,padding:32,width:500,maxHeight:'92vh',overflowY:'auto',animation:'scaleIn 0.22s ease',boxShadow:'0 32px 100px rgba(0,0,0,0.8)'}}>

        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:28}}>
          <div>
            <div style={{fontFamily:'Archivo Black',fontSize:22}}>Add Your <span style={{color:'#CC1A88'}}>Shot</span></div>
            <div style={{display:'flex',alignItems:'center',gap:6,marginTop:8,background:'rgba(123,45,139,0.15)',border:'1px solid rgba(123,45,139,0.3)',borderRadius:7,padding:'4px 10px',width:'fit-content'}}>
              <Ico n="github" s={11} c="#B060DD"/>
              <span style={{fontSize:10,color:'#B060DD',fontFamily:'monospace'}}>eugineous/urbang-gang-photos</span>
            </div>
          </div>
          <button onClick={onClose} style={{color:'rgba(245,240,248,0.4)',padding:4}}><Ico n="close" s={20}/></button>
        </div>

        {phase==='done'?(
          <div style={{textAlign:'center',padding:'44px 0',animation:'fadeUp 0.3s ease'}}>
            <div style={{width:64,height:64,borderRadius:'50%',background:'linear-gradient(135deg,#CC1A88,#F5921E)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
              <Ico n="check" s={28} c="#fff"/>
            </div>
            <div style={{fontFamily:'Archivo Black',fontSize:22,marginBottom:8}}>Pushed to GitHub</div>
            <div style={{color:'rgba(245,240,248,0.5)',fontSize:13}}>Original quality preserved · Syncing to CDN</div>
          </div>
        ):phase==='up'?(
          <div style={{padding:'20px 0',animation:'fadeIn 0.2s ease'}}>
            <div style={{marginBottom:24}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,fontSize:13}}>
                <span style={{fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'80%'}}>{file?.name}</span>
                <span style={{color:'#CC1A88',fontWeight:800}}>{Math.round(prog)}%</span>
              </div>
              <div style={{background:'#262230',borderRadius:4,height:5,overflow:'hidden'}}>
                <div style={{height:'100%',background:'linear-gradient(90deg,#CC1A88,#F5921E)',width:`${prog}%`,borderRadius:4,transition:'width 0.18s'}}/>
              </div>
            </div>
            <div style={{fontSize:11,color:'rgba(245,240,248,0.4)',display:'flex',alignItems:'center',gap:6}}>
              <div style={{animation:'spin 1s linear infinite',display:'flex'}}><Ico n="github" s={11} c="rgba(245,240,248,0.4)"/></div>
              Pushing → {catLabel}/{file?.name}
            </div>
          </div>
        ):(
          <>
            <div
              style={{border:`2px dashed ${drag?'#CC1A88':file?'#F5921E':'rgba(255,255,255,0.1)'}`,borderRadius:14,padding:'36px 20px',textAlign:'center',marginBottom:20,background:drag?'rgba(204,26,136,0.06)':file?'rgba(245,146,30,0.06)':'rgba(255,255,255,0.02)',transition:'all 0.18s',cursor:'pointer'}}
              onDragOver={e=>{e.preventDefault();setDrag(true)}}
              onDragLeave={()=>setDrag(false)}
              onDrop={onDrop}
              onClick={()=>document.getElementById('_fi2').click()}
            >
              <input id="_fi2" type="file" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f)pick(f);}} accept="image/*,video/*,.raw,.cr2,.nef,.arw,.dng,audio/*,.pdf"/>
              {file?(
                <>
                  <div style={{fontSize:40,marginBottom:8}}>{file.type.startsWith('video')?'🎬':file.type.startsWith('image')?'📸':'📁'}</div>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:4,wordBreak:'break-all'}}>{file.name}</div>
                  <div style={{color:'rgba(245,240,248,0.45)',fontSize:12}}>{fmtSz(file.size)}</div>
                  <div style={{color:'#F5921E',fontSize:11,marginTop:8,fontWeight:600}}>Click to change</div>
                </>
              ):(
                <>
                  <div style={{marginBottom:14,opacity:0.35}}><Ico n="upload" s={40} c="#CC1A88"/></div>
                  <div style={{fontFamily:'Archivo Black',fontSize:16,marginBottom:6}}>DROP YOUR SHOT HERE</div>
                  <div style={{color:'rgba(245,240,248,0.45)',fontSize:12,marginBottom:16}}>Photos · Videos · 4K · RAW · Audio · Docs</div>
                  <div style={{display:'inline-block',padding:'8px 22px',borderRadius:8,background:'rgba(255,255,255,0.06)',fontSize:13,fontWeight:700,border:'1px solid rgba(255,255,255,0.1)'}}>Browse Files</div>
                </>
              )}
            </div>

            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div>
                <label style={{fontSize:11,fontWeight:800,letterSpacing:'0.1em',color:'rgba(245,240,248,0.4)',display:'block',marginBottom:6}}>TITLE YOUR MOMENT</label>
                <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Give it a name..."
                  style={{width:'100%',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,padding:'10px 14px',color:'#F5F0F8',fontSize:14,outline:'none'}}/>
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:800,letterSpacing:'0.1em',color:'rgba(245,240,248,0.4)',display:'block',marginBottom:6}}>SCHOOL / ALBUM</label>
                <select value={cat} onChange={e=>setCat(e.target.value)}
                  style={{width:'100%',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,padding:'10px 14px',color:cat?'#F5F0F8':'rgba(245,240,248,0.3)',fontSize:13,outline:'none',cursor:'pointer'}}>
                  <option value="" disabled>Pick a school or event…</option>
                  {CATS.filter(c=>c.id!=='all').map(c=><option key={c.id} value={c.id}>{c.name}{c.date?` — ${c.date}`:''}</option>)}
                  <option value="__new">+ Create new album…</option>
                </select>
              </div>
              {cat&&file&&(
                <div style={{background:'rgba(123,45,139,0.1)',border:'1px solid rgba(123,45,139,0.25)',borderRadius:10,padding:'10px 14px',animation:'fadeUp 0.2s ease'}}>
                  <div style={{color:'rgba(245,240,248,0.4)',fontSize:11,marginBottom:4,display:'flex',alignItems:'center',gap:5}}>
                    <Ico n="github" s={11} c="rgba(245,240,248,0.4)"/>Stored at:
                  </div>
                  <div style={{color:'#B060DD',fontFamily:'monospace',fontSize:10,wordBreak:'break-all'}}>eugineous/urbang-gang-photos/{cat}/{file.name}</div>
                </div>
              )}
              <button onClick={doUp} disabled={!file||!cat}
                style={{background:file&&cat?'linear-gradient(90deg,#CC1A88,#F5921E)':'rgba(255,255,255,0.06)',color:file&&cat?'#fff':'rgba(245,240,248,0.25)',border:'none',borderRadius:12,padding:'14px',fontSize:15,fontWeight:900,fontFamily:'Archivo Black',cursor:file&&cat?'pointer':'not-allowed',letterSpacing:'0.05em',transition:'all 0.2s'}}>
                UPLOAD TO GANG MOMENTS ↗
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ─── LIGHTBOX ─── */
function Lightbox({items,idx,onClose,onNav}){
  const item=items[idx];
  const cat=CATS.find(c=>c.id===item.cat);
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();if(e.key==='ArrowLeft')onNav(-1);if(e.key==='ArrowRight')onNav(1);};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[onClose,onNav]);

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(5,4,8,0.97)',zIndex:3000,display:'flex',flexDirection:'column',animation:'fadeIn 0.2s ease'}}>
      <div style={{height:60,borderBottom:'1px solid rgba(255,255,255,0.07)',display:'flex',alignItems:'center',padding:'0 20px',gap:14,flexShrink:0}}>
        <Badge type={item.type}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:'Archivo Black',fontSize:15,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.title}</div>
          <div style={{fontSize:11,color:'rgba(245,240,248,0.4)',marginTop:1}}>{cat?.name}{cat?.date?` · ${cat.date}`:''} · by {item.by} · {item.sz}</div>
        </div>
        <div style={{display:'flex',gap:8,flexShrink:0}}>
          <button style={{background:'linear-gradient(90deg,#CC1A88,#F5921E)',color:'#fff',border:'none',borderRadius:10,padding:'9px 18px',fontSize:13,fontWeight:800,cursor:'pointer',display:'flex',alignItems:'center',gap:6,letterSpacing:'0.04em',fontFamily:'Archivo Black'}}>
            <Ico n="download" s={13} c="#fff"/>DOWNLOAD ORIGINAL
          </button>
          <button onClick={onClose} style={{color:'rgba(245,240,248,0.45)',padding:8,display:'flex',alignItems:'center'}}><Ico n="close" s={22}/></button>
        </div>
      </div>

      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',padding:'24px 80px'}}>
        <div style={{
          width:Math.min(860,item.h*1.55),height:Math.min(580,item.h*1.4),
          background:GRADS[item.g],borderRadius:14,
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 0 0 1px rgba(255,255,255,0.05),0 60px 120px rgba(0,0,0,0.9)',
          position:'relative',overflow:'hidden',animation:'scaleIn 0.2s ease',
        }}>
          <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(0,0,0,0.2),rgba(0,0,0,0.45))'}}/>
          {item.type==='video'&&(
            <div style={{position:'relative',width:72,height:72,borderRadius:'50%',background:'rgba(0,0,0,0.65)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid rgba(255,255,255,0.25)',cursor:'pointer',paddingLeft:3}}>
              <Ico n="play" s={28} c="#fff"/>
            </div>
          )}
          {item.type==='raw'&&(
            <div style={{position:'relative',textAlign:'center',color:'rgba(255,255,255,0.85)'}}>
              <div style={{fontFamily:'Archivo Black',fontSize:24,letterSpacing:'0.1em',marginBottom:8}}>RAW FILE</div>
              <div style={{fontSize:14,opacity:0.6}}>{item.sz} · Original quality</div>
            </div>
          )}
        </div>
        {[{d:-1,s:'left',n:'left'},{d:1,s:'right',n:'right'}].map(({d,s,n})=>(
          <button key={s} onClick={()=>onNav(d)} style={{position:'absolute',[s]:20,background:'rgba(22,20,34,0.9)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:12,padding:'13px',color:'#F5F0F8',display:'flex',cursor:'pointer',backdropFilter:'blur(8px)'}}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(204,26,136,0.3)'}
            onMouseLeave={e=>e.currentTarget.style.background='rgba(22,20,34,0.9)'}>
            <Ico n={n} s={20}/>
          </button>
        ))}
      </div>

      <div style={{height:40,borderTop:'1px solid rgba(255,255,255,0.06)',display:'flex',alignItems:'center',justifyContent:'center',gap:16,flexShrink:0}}>
        <span style={{fontSize:13,color:'rgba(245,240,248,0.3)'}}>{idx+1} / {items.length}</span>
        <span style={{fontSize:11,color:'rgba(245,240,248,0.2)'}}>← → navigate · ESC close</span>
      </div>
    </div>
  );
}

/* ─── TWEAKS ─── */
function TweaksPanel({open,onClose,tweaks,set}){
  if(!open)return null;
  return(
    <div style={{position:'fixed',bottom:72,right:20,zIndex:4000,background:'#141220',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:20,width:230,boxShadow:'0 20px 60px rgba(0,0,0,0.7)',animation:'fadeUp 0.2s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <div style={{fontFamily:'Archivo Black',fontSize:14,letterSpacing:'0.02em'}}>Tweaks</div>
        <button onClick={onClose} style={{color:'rgba(245,240,248,0.4)'}}><Ico n="close" s={16}/></button>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:800,letterSpacing:'0.12em',color:'rgba(245,240,248,0.35)',marginBottom:8}}>COLUMNS</div>
        <div style={{display:'flex',gap:6}}>
          {[2,3,4].map(n=>(
            <button key={n} onClick={()=>set('cols',n)} style={{flex:1,padding:'8px 0',borderRadius:8,background:tweaks.cols===n?'#CC1A88':'rgba(255,255,255,0.05)',border:`1px solid ${tweaks.cols===n?'transparent':'rgba(255,255,255,0.07)'}`,color:'#F5F0F8',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'Archivo Black'}}>{n}</button>
          ))}
        </div>
      </div>
      <div>
        <div style={{fontSize:10,fontWeight:800,letterSpacing:'0.12em',color:'rgba(245,240,248,0.35)',marginBottom:8}}>CATEGORY BAR</div>
        <div style={{display:'flex',gap:6}}>
          {[{k:'magenta',c:'#CC1A88'},{k:'dark',c:'#1E1C28'},{k:'orange',c:'#F5921E'}].map(o=>(
            <button key={o.k} onClick={()=>set('catBar',o.k)} title={o.k} style={{flex:1,height:30,borderRadius:7,background:o.c,border:`3px solid ${tweaks.catBar===o.k?'#fff':'transparent'}`,cursor:'pointer',transition:'transform 0.15s',transform:tweaks.catBar===o.k?'scale(1.1)':'scale(1)'}}/>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── APP ─── */
function App(){
  const [tweaks,setTweaksState]=useState(TWEAK_DEFAULTS);
  const [activeCat,setActiveCat]=useState('all');
  const [lbIdx,setLbIdx]=useState(null);
  const [uploadOpen,setUploadOpen]=useState(false);
  const [selected,setSelected]=useState(new Set());
  const [bulk,setBulk]=useState(false);
  const [query,setQuery]=useState('');
  const [fType,setFType]=useState('all');
  const [toasts,setToasts]=useState([]);
  const [tweakOpen,setTweakOpen]=useState(false);

  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode')setTweakOpen(true);
      if(e.data?.type==='__deactivate_edit_mode')setTweakOpen(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const setTweak=(k,v)=>{
    const next={...tweaks,[k]:v};setTweaksState(next);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');
  };

  const addToast=(msg,type='success')=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);};

  const filtered=useMemo(()=>ITEMS.filter(it=>{
    if(activeCat!=='all'&&it.cat!==activeCat)return false;
    if(fType!=='all'&&it.type!==fType)return false;
    if(query&&!it.title.toLowerCase().includes(query.toLowerCase())&&!it.by.toLowerCase().includes(query.toLowerCase()))return false;
    return true;
  }),[activeCat,fType,query]);

  const toggleSel=id=>{setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});};
  const bulkDL=()=>{addToast(`Preparing ${selected.size} files…`,'info');setTimeout(()=>{addToast(`Downloaded ${selected.size} files as ZIP!`);setSelected(new Set());setBulk(false);},2000);};

  // Category bar bg
  const catBg=tweaks.catBar==='dark'?'#1B1928':tweaks.catBar==='orange'?'#E07800':'#CC1A88';
  const catActiveBg=tweaks.catBar==='dark'?'#CC1A88':tweaks.catBar==='orange'?'rgba(0,0,0,0.25)':'rgba(0,0,0,0.22)';
  const catActiveColor=tweaks.catBar==='dark'?'#fff':'#fff';
  const catInactiveColor=tweaks.catBar==='dark'?'rgba(245,240,248,0.55)':'rgba(255,255,255,0.7)';

  // Section rendering for "All" view
  const renderGallery=()=>{
    if(activeCat==='all'&&fType==='all'&&!query){
      // Editorial sections view
      return CATS.filter(c=>c.id!=='all').map(cat=>{
        const catItems=ITEMS.filter(it=>it.cat===cat.id);
        if(!catItems.length)return null;
        return(
          <div key={cat.id}>
            <SectionDivider cat={cat}/>
            <div style={{columns:tweaks.cols,columnGap:10,marginBottom:10}}>
              {catItems.map(item=>(
                <Card key={item.id} item={item}
                  onOpen={it=>setLbIdx(filtered.findIndex(x=>x.id===it.id))}
                  selected={selected.has(item.id)} onSelect={toggleSel} bulk={bulk}/>
              ))}
            </div>
          </div>
        );
      });
    }
    // Filtered view
    if(!filtered.length){
      return(
        <div style={{textAlign:'center',padding:'80px 0',color:'rgba(245,240,248,0.3)'}}>
          <div style={{fontFamily:'Archivo Black',fontSize:18,marginBottom:8}}>NO MOMENTS FOUND</div>
          <div style={{fontSize:13}}>Try a different filter or upload something!</div>
        </div>
      );
    }
    const catInfo=CATS.find(c=>c.id===activeCat);
    return(
      <>
        {activeCat!=='all'&&<SectionDivider cat={catInfo}/>}
        <div style={{columns:tweaks.cols,columnGap:10}}>
          {filtered.map(item=>(
            <Card key={item.id} item={item}
              onOpen={it=>setLbIdx(filtered.findIndex(x=>x.id===it.id))}
              selected={selected.has(item.id)} onSelect={toggleSel} bulk={bulk}/>
          ))}
        </div>
      </>
    );
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden',background:'#0C0B10'}}>

      {/* ── NAV ── */}
      <nav style={{height:56,background:'#0A0910',borderBottom:'1px solid rgba(255,255,255,0.06)',display:'flex',alignItems:'center',padding:'0 18px',gap:14,flexShrink:0,zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0,marginRight:4}}>
          <img src="uploads/URBAN GANG TOUR OFFICIAL LOGO.png" style={{height:34,width:'auto'}} alt="Urban Gang"/>
          <div style={{borderLeft:'1px solid rgba(255,255,255,0.1)',paddingLeft:10}}>
            <div style={{fontFamily:'Archivo Black',fontSize:11,letterSpacing:'0.05em',color:'#F5F0F8',lineHeight:1.15}}>GANG</div>
            <div style={{fontFamily:'Archivo Black',fontSize:9,letterSpacing:'0.2em',color:'#CC1A88',lineHeight:1.15}}>MOMENTS</div>
          </div>
        </div>

        <div style={{flex:1,maxWidth:380,position:'relative'}}>
          <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}>
            <Ico n="search" s={14} c="rgba(245,240,248,0.25)"/>
          </div>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search moments, schools, people..."
            style={{width:'100%',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:9,padding:'7px 12px 7px 34px',color:'#F5F0F8',fontSize:13,outline:'none'}}/>
        </div>

        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          {/* Type filter */}
          <div style={{display:'flex',gap:2,background:'rgba(255,255,255,0.04)',borderRadius:8,padding:3}}>
            {['all','photo','video','raw'].map(t=>(
              <button key={t} onClick={()=>setFType(t)} style={{padding:'4px 10px',borderRadius:6,background:fType===t?'rgba(255,255,255,0.08)':'transparent',color:fType===t?'#F5F0F8':'rgba(245,240,248,0.35)',fontSize:10,fontWeight:800,letterSpacing:'0.08em',cursor:'pointer',transition:'all 0.15s'}}>
                {t.toUpperCase()}
              </button>
            ))}
          </div>

          {/* GitHub */}
          <div style={{display:'flex',alignItems:'center',gap:5,background:'rgba(123,45,139,0.12)',border:'1px solid rgba(123,45,139,0.25)',borderRadius:7,padding:'4px 9px',cursor:'pointer'}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:'#4CAF50',flexShrink:0}}/>
            <Ico n="github" s={11} c="#B060DD"/>
            <span style={{fontSize:10,color:'#B060DD',fontFamily:'monospace',whiteSpace:'nowrap'}}>eugineous/urbang-gang-photos</span>
          </div>

          <button onClick={()=>{setBulk(!bulk);if(bulk)setSelected(new Set());}} style={{padding:'5px 12px',borderRadius:7,background:bulk?'rgba(204,26,136,0.15)':'rgba(255,255,255,0.04)',border:`1px solid ${bulk?'rgba(204,26,136,0.4)':'rgba(255,255,255,0.08)'}`,color:bulk?'#F050BE':'rgba(245,240,248,0.55)',fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>
            {bulk?`${selected.size} sel.`:'Select'}
          </button>

          <button onClick={()=>setUploadOpen(true)} style={{background:'linear-gradient(90deg,#CC1A88,#F5921E)',color:'#fff',border:'none',borderRadius:9,padding:'7px 16px',fontSize:12,fontWeight:900,fontFamily:'Archivo Black',display:'flex',alignItems:'center',gap:5,letterSpacing:'0.04em',whiteSpace:'nowrap'}}>
            <Ico n="upload" s={13} c="#fff"/>UPLOAD
          </button>
        </div>
      </nav>

      {/* ── CATEGORY BAR (MAGENTA) ── */}
      <div className="catbar" style={{background:catBg,display:'flex',alignItems:'center',gap:4,padding:'0 16px',flexShrink:0,height:46,overflowX:'auto',whiteSpace:'nowrap'}}>
        {CATS.map(cat=>{
          const active=activeCat===cat.id;
          return(
            <button key={cat.id} onClick={()=>setActiveCat(cat.id)} style={{
              display:'inline-flex',alignItems:'center',gap:6,
              padding:'5px 14px',borderRadius:22,flexShrink:0,
              background:active?catActiveBg:'transparent',
              color:active?catActiveColor:catInactiveColor,
              border:active?'1px solid rgba(255,255,255,0.25)':'1px solid transparent',
              cursor:'pointer',fontSize:11,fontWeight:800,
              letterSpacing:'0.04em',transition:'all 0.15s',
              backdropFilter:active?'blur(6px)':'none',
            }}>
              {cat.dateShort&&(
                <span style={{fontFamily:'Archivo Black',fontSize:9,opacity:0.8,background:'rgba(0,0,0,0.2)',borderRadius:3,padding:'1px 5px'}}>{cat.dateShort}</span>
              )}
              {cat.short}
              <span style={{fontSize:9,opacity:0.6,background:'rgba(0,0,0,0.15)',borderRadius:10,padding:'0px 5px'}}>{cat.count}</span>
            </button>
          );
        })}
      </div>

      {/* ── MAIN ── */}
      <main style={{flex:1,overflowY:'auto',padding:'0 20px 40px'}}>
        {renderGallery()}
      </main>

      {/* ── BULK BAR ── */}
      {bulk&&selected.size>0&&(
        <div style={{position:'fixed',bottom:20,left:'50%',transform:'translateX(-50%)',background:'#141220',border:'1px solid rgba(255,255,255,0.1)',borderRadius:16,padding:'12px 20px',display:'flex',alignItems:'center',gap:16,boxShadow:'0 8px 40px rgba(0,0,0,0.8)',animation:'fadeUp 0.2s ease',zIndex:500}}>
          <span style={{fontFamily:'Archivo Black',fontSize:14}}>{selected.size} selected</span>
          <button onClick={bulkDL} style={{background:'linear-gradient(90deg,#CC1A88,#F5921E)',color:'#fff',border:'none',borderRadius:10,padding:'9px 18px',fontSize:12,fontWeight:900,fontFamily:'Archivo Black',cursor:'pointer',display:'flex',alignItems:'center',gap:6,letterSpacing:'0.04em',whiteSpace:'nowrap'}}>
            <Ico n="zip" s={13} c="#fff"/>DOWNLOAD ZIP
          </button>
          <button onClick={()=>{setSelected(new Set());setBulk(false);}} style={{color:'rgba(245,240,248,0.4)',fontSize:12,cursor:'pointer'}}>Cancel</button>
        </div>
      )}

      {/* ── TWEAKS BTN ── */}
      <button onClick={()=>{setTweakOpen(!tweakOpen);if(tweakOpen)window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}}
        style={{position:'fixed',bottom:20,right:20,background:tweakOpen?'#CC1A88':'rgba(255,255,255,0.06)',border:`1px solid ${tweakOpen?'transparent':'rgba(255,255,255,0.1)'}`,color:'#F5F0F8',borderRadius:10,padding:'8px 14px',fontSize:11,fontWeight:800,display:'flex',alignItems:'center',gap:6,zIndex:3999,boxShadow:'0 4px 20px rgba(0,0,0,0.5)',cursor:'pointer',transition:'all 0.18s',letterSpacing:'0.05em',fontFamily:'Archivo Black'}}>
        <Ico n="sliders" s={14} c="#F5F0F8"/>TWEAKS
      </button>

      <TweaksPanel open={tweakOpen} onClose={()=>setTweakOpen(false)} tweaks={tweaks} set={setTweak}/>
      {uploadOpen&&<UploadModal onClose={()=>setUploadOpen(false)} onDone={()=>addToast('Pushed to GitHub — original quality preserved!')}/>}
      {lbIdx!==null&&<Lightbox items={filtered.length?filtered:ITEMS} idx={Math.max(0,Math.min(lbIdx,(filtered.length||ITEMS.length)-1))} onClose={()=>setLbIdx(null)} onNav={d=>setLbIdx(i=>Math.max(0,Math.min((filtered.length||ITEMS.length)-1,i+d)))}/>}
      <Toasts list={toasts} remove={id=>setToasts(t=>t.filter(x=>x.id!==id))}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
